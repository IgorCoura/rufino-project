workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 30
    instance_type: mac_mini_m2
    working_directory: client/rufino_v2

    integrations:
      app_store_connect: Rufino Project

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: br.com.couratechsafety.rufino
      groups:
        - rufino_ios_secrets
      vars:
        APP_STORE_APPLE_ID: 0000000000
      flutter: stable
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.cocoapods
        - $FLUTTER_ROOT/.pub-cache

    scripts:
      - name: Restore prod config secret
        script: |
          if [ -z "$PROD_CONFIG_JSON" ]; then
            echo "ERROR: PROD_CONFIG_JSON env var is empty. Add it to the rufino_ios_secrets group." >&2
            exit 1
          fi
          mkdir -p secrets
          printf '%s' "$PROD_CONFIG_JSON" > secrets/prod_config.json

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Flutter analyze
        script: flutter analyze
        ignore_failure: true

      - name: Flutter test
        script: flutter test

      - name: Build IPA
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID") + 1))
          flutter build ipa --release \
            --build-name=2.0.0 \
            --build-number=$BUILD_NUMBER \
            --dart-define-from-file=secrets/prod_config.json \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - client/rufino_v2/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - client/rufino_v2/flutter_drive.log

    publishing:
      email:
        recipients:
          - igor-coura@hotmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
