services:
  economiccore.api:
    image: ${DOCKER_REGISTRY-}economiccoreapi
    build:
      context: .
      dockerfile: EconomicCore.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__EconomicCore: "Host=economiccore.db;Port=5432;Database=EconomicCoreDb;Username=admin;Password=5up3rS3nh@;Search Path=economic_core"
    ports:
      - 8090:8080
    depends_on:
      economiccore.db:
        condition: service_healthy

  economiccore.db:
    image: postgres:17-alpine
    restart: always
    volumes:
      - economiccore-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "5up3rS3nh@"
      POSTGRES_DB: "EconomicCoreDb"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - 8092:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d EconomicCoreDb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  economiccore-db:
