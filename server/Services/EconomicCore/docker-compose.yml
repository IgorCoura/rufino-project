version: '3.4'

services:
  economiccore.api:
    image: ${DOCKER_REGISTRY-}economiccoreapi
    build:
      context: .
      dockerfile: EconomicCore.API/Dockerfile
    environment:
      ASPNETCORE_URLS: "https://+;http://+"
      ASPNETCORE_HTTPS_PORT: "443"
      ASPNETCORE_ENVIRONMENT: Development
    volumes:
      - ${APPDATA}\microsoft\UserSecrets\:/root/.microsoft/usersecrets
      - ${USERPROFILE}\.aspnet\https:/root/.aspnet/https/
    ports:
      - 8060:80
      - 8061:443
    depends_on:
      - economiccore.db

  economiccore.db:
    image: postgres:16.4-alpine
    restart: always
    volumes:
      - economiccore-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "5up3rS3nh@"
      POSTGRES_DB: "EconomicCoreDb"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - 8062:5432

volumes:
  economiccore-db:
