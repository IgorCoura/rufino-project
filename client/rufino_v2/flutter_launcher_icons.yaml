flutter_launcher_icons:
  image_path: "assets/icon/rufino-icon-1024.png"

  android: "ic_launcher"
  min_sdk_android: 21
  adaptive_icon_background: "#00695C"
  adaptive_icon_foreground: "assets/icon/rufino-icon-foreground-1024.png"

  ios: true
  remove_alpha_ios: true

  macos:
    generate: true
    image_path: "assets/icon/rufino-icon-1024.png"

  web:
    generate: true
    image_path: "assets/icon/rufino-icon-1024.png"
    background_color: "#00695C"
    theme_color: "#00695C"

  windows:
    generate: true
    image_path: "assets/icon/rufino-icon-1024.png"
    icon_size: 256
