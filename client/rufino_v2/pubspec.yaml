name: rufino_v2
description: "Rufino — gestão de pessoas"
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.5.2

dependencies:
  sentry_flutter: ^9.19.0
  flutter:
    sdk: flutter
  web: ^1.1.0
  # State / DI / Routing
  provider: ^6.1.2
  nested: ^1.0.0
  go_router: ^14.6.2
  # Auth
  oauth2: ^2.0.2
  flutter_secure_storage: ^9.2.2
  jwt_decoder: ^2.0.1
  flutter_appauth: ^7.0.1
  url_launcher: ^6.3.1
  crypto: ^3.0.3
  # HTTP
  http: ^1.2.2
  file_picker: ^8.1.7
  # UI
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2719.1
  shimmer: ^3.0.0
  mask_text_input_formatter: ^2.9.0
  flutter_json_view: ^1.1.5
  syncfusion_flutter_pdf: ^27.1.58
  syncfusion_flutter_pdfviewer: ^27.1.58
  # Document scanning
  cunning_document_scanner: ^1.4.0
  camera: ^0.11.0
  google_mlkit_text_recognition: ^0.14.0
  permission_handler: ^12.0.1
  pdf: ^3.11.1
  image: ^4.3.0
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  pdf_combiner: ^6.0.4
  archive: ^3.6.1
  # Spreadsheet export
  syncfusion_flutter_xlsio: ^27.1.58
  file_saver: ^0.2.13
  # Brand assets
  flutter_svg: ^2.0.10+1

dev_dependencies:
  sentry_dart_plugin: ^3.3.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/img/

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: igor-de-brito-coura
