parent=keycloak.v2
import=common/keycloak

# IMPORTANT — `styles=` REPLACES the parent's stylesheet list, it does
# not append. We must re-list the upstream `css/styles.css` (resolved
# from keycloak.v2 via parent inheritance) BEFORE our color override.
# Source: Keycloak 26.3 server_development docs, Themes chapter.
styles=css/styles.css css/override.css

locales=pt-BR,en
defaultLocale=pt-BR
