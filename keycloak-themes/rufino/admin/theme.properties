parent=keycloak.v2

# The admin console is a React SPA — its bundle is injected via
# `entryStyles` (Vite manifest) by index.ftl, separate from
# `properties.styles`. So our override file loads after the bundle and
# CSS variable overrides cascade into the React tree.
styles=css/override.css

locales=pt-BR,en
defaultLocale=pt-BR
