parent=keycloak.v3

# Account Console v3 is a React SPA — its own bundle is injected via
# `entryStyles` (Vite manifest) by index.ftl, separately from
# `properties.styles`. So our override file is loaded AFTER the bundle
# and CSS variable overrides cascade into the React tree.
styles=css/override.css

locales=pt-BR,en
defaultLocale=pt-BR
