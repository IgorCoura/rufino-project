<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <title>RUFINO</title>
  <desc>Logo RUFINO lock-up com fundo branco - símbolo two-tone + wordmark em paleta teal</desc>

  <!-- ===== FUNDO BRANCO ARREDONDADO ===== -->
  <rect x="0" y="0" width="800" height="240" rx="40" fill="#FFFFFF"/>

  <!-- ===== SÍMBOLO ===== -->
  <g transform="translate(40, 40)">
    <!-- Badge arredondado teal -->
    <rect x="0" y="0" width="160" height="160" rx="34" fill="#00695C"/>

    <!-- Corpo do R em branco -->
    <path d="M 43 34
             L 43 126
             L 62 126
             L 62 92
             L 84 92
             Q 86 92 88 93
             L 109 126
             L 131 126
             L 103 92
             Q 123 82 123 63
             Q 123 34 92 34 Z
             M 62 50
             L 90 50
             Q 106 50 106 64
             Q 106 78 90 78
             L 62 78 Z"
          fill="#FFFFFF"/>

    <!-- Perna do R em tom de destaque (two-tone) -->
    <path d="M 88 93
             L 109 126
             L 131 126
             L 110 93 Z"
          fill="#4DB6AC"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text x="240" y="148"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="96"
        font-weight="500"
        letter-spacing="2"
        fill="#00695C">Rufino</text>
</svg>
