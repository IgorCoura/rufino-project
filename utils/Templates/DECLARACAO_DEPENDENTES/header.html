<link rel="stylesheet" href="styles/style.css">
<meta name="pdf-margin-top" content="30mm">
<header style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; padding: 0 20mm; margin: auto; border-bottom: 0.5px solid #ccc;">
    <div style="font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif; font-size: 9pt; font-weight: 700; color: #000; letter-spacing: 2px; text-transform: uppercase; text-align: center; width: 100%;">
        {{Company.CorporateName}}
    </div>
    <div style="font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif; font-size: 5.5pt; color: #999; letter-spacing: 0.3px; margin-top: 1px; text-align: center; width: 100%;">
        CNPJ: {{Company.Cnpj}} · {{Company.Address.Street}}, {{Company.Address.Number}} {{Company.Address.Complement}} — {{Company.Address.Neighborhood}} — {{Company.Address.City}}/{{Company.Address.State}} — CEP {{Company.Address.ZipCode}}
    </div>
</header>
